<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&ID — Dashboard de Equipos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0e14;--s1:#13161f;--s2:#1a1e2b;--s3:#222637;
  --border:#252a3a;--border2:#333b52;
  --teal:#00c9a7;--teal-lo:#00c9a712;--teal-mi:#00c9a730;
  --amber:#f0a500;--amber-lo:#f0a50015;--amber-mi:#f0a50040;
  --red:#ff4d6d;--red-lo:#ff4d6d15;--red-mi:#ff4d6d40;
  --green:#22c55e;--green-lo:#22c55e12;--green-mi:#22c55e35;
  --purple:#7f77dd;--purple-lo:#7f77dd12;--purple-mi:#7f77dd35;
  --txt:#dde3f0;--txt2:#7c87a0;--txt3:#424d64;
  --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
  --r:10px;--rlg:16px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.2;pointer-events:none;z-index:0;}
header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;color:#0c0e14;line-height:1.2;text-align:center;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);}
.breadcrumb a{color:var(--txt2);text-decoration:none;}
.breadcrumb a:hover{color:var(--txt);}
.breadcrumb span{color:var(--txt3);}
.breadcrumb strong{color:var(--amber);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--txt2);font-family:var(--sans);font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.hdr-btn:hover{background:var(--s2);color:var(--txt);}
.hdr-btn.primary{background:var(--green);border-color:var(--green);color:#0c0e14;font-weight:700;}
.hdr-btn.primary:hover{filter:brightness(1.08);}
.hdr-btn.amber{border-color:var(--amber-mi);color:var(--amber);}
.hdr-btn.amber:hover{background:var(--amber-lo);}

main{max-width:1200px;margin:0 auto;padding:2rem 2rem 5rem;position:relative;z-index:1;}

/* PROJECT BANNER */
.project-banner{background:var(--s1);border:1px solid var(--border);border-radius:var(--rlg);padding:1.25rem 1.5rem;margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.pb-info{display:flex;align-items:center;gap:14px;}
.pb-icon{width:40px;height:40px;background:var(--purple-lo);border:1px solid var(--purple-mi);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--purple);font-weight:600;}
.pb-num{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:1px;}
.pb-name{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.pb-client{font-family:var(--mono);font-size:11px;padding:2px 10px;border-radius:4px;background:var(--purple-lo);color:var(--purple);border:1px solid var(--purple-mi);}
.pb-client.ailsa{background:var(--teal-lo);color:var(--teal);border-color:var(--teal-mi);}
.pb-client.acsesa{background:var(--amber-lo);color:var(--amber);border-color:var(--amber-mi);}
.pb-client.calidra{background:var(--green-lo);color:var(--green);border-color:var(--green-mi);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem;}
.stat-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;}
.stat-num{font-family:var(--mono);font-size:26px;font-weight:600;display:block;}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:2px;}
.stat-box.c-teal .stat-num{color:var(--teal);}
.stat-box.c-green .stat-num{color:var(--green);}
.stat-box.c-amber .stat-num{color:var(--amber);}
.stat-box.c-red .stat-num{color:var(--red);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;}
.toolbar-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;}
.search-in{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px 8px 34px;color:var(--txt);font-family:var(--sans);font-size:13px;outline:none;width:220px;}
.search-in:focus{border-color:var(--teal);}
.search-in::placeholder{color:var(--txt3);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:14px;}
.filter-sel{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;color:var(--txt);font-family:var(--sans);font-size:13px;outline:none;cursor:pointer;appearance:none;}
.area-chips{display:flex;gap:6px;flex-wrap:wrap;}
.area-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--txt2);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--sans);}
.area-chip:hover{background:var(--s2);color:var(--txt);}
.area-chip.active{background:var(--teal-lo);border-color:var(--teal-mi);color:var(--teal);}

/* EQUIPMENT GRID */
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.eq-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rlg);padding:1.2rem;transition:all .2s;position:relative;overflow:hidden;}
.eq-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal);opacity:0;transition:opacity .2s;}
.eq-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.eq-card:hover::after{opacity:1;}
.eq-card.ds-done{border-color:var(--green-mi);}
.eq-card.ds-done::after{background:var(--green);opacity:.8;}
.eq-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.eq-tag-badge{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--teal);background:var(--teal-lo);padding:3px 9px;border-radius:5px;}
.eq-type-b{font-size:10px;color:var(--txt2);background:var(--s3);padding:2px 8px;border-radius:4px;border:1px solid var(--border);}
.eq-name{font-size:14px;font-weight:600;margin-bottom:2px;line-height:1.3;}
.eq-area{font-size:11px;color:var(--txt2);font-family:var(--mono);margin-bottom:10px;}
.eq-specs{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px;}
.eq-spec{background:var(--bg);border-radius:5px;padding:5px 8px;}
.eq-spec-l{font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:.5px;display:block;margin-bottom:1px;}
.eq-spec-v{font-size:11px;font-weight:500;font-family:var(--mono);color:var(--txt);}
.ds-status{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);padding:5px 10px;border-radius:6px;margin-bottom:10px;}
.ds-status.pending{background:var(--amber-lo);color:var(--amber);border:1px solid var(--amber-mi);}
.ds-status.done{background:var(--green-lo);color:var(--green);border:1px solid var(--green-mi);}
.ds-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.eq-actions{display:flex;gap:6px;}
.eq-btn{flex:1;padding:8px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--txt2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;text-align:center;text-decoration:none;display:inline-block;}
.eq-btn:hover{background:var(--s2);color:var(--txt);}
.eq-btn.primary{background:var(--teal);border-color:var(--teal);color:#0c0e14;font-weight:600;}
.eq-btn.primary:hover{filter:brightness(1.08);}
.eq-btn.success{background:var(--green);border-color:var(--green);color:#0c0e14;font-weight:600;}
.eq-btn.success:hover{filter:brightness(1.08);}

/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--txt3);grid-column:1/-1;}
.empty-icon{font-size:48px;display:block;margin-bottom:1rem;opacity:.25;}
.empty-title{font-size:18px;font-weight:700;color:var(--txt2);margin-bottom:8px;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
@media(max-width:640px){.stats-row{grid-template-columns:1fr 1fr;}main{padding:1.5rem 1rem 4rem;}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">P&amp;<br>ID</div>
    <div class="breadcrumb">
      <a href="00_proyectos.html">Proyectos</a><span>&#8250;</span>
      <strong id="hdr-project-name">Dashboard</strong>
    </div>
  </div>
  <div class="hdr-right">
    <a href="02_subir_pid.html" class="hdr-btn">+ Analizar P&ID</a>
    <button class="hdr-btn amber" onclick="exportEquipmentList()">&#8595; Lista CSV</button>
    <a href="05_datasheet.html" class="hdr-btn primary">&#9783; Generar Datasheets</a>
  </div>
</header>

<main>
  <div class="project-banner" id="project-banner" style="display:none;">
    <div class="pb-info">
      <div class="pb-icon" id="pb-icon">---</div>
      <div>
        <div class="pb-num" id="pb-num">---</div>
        <div class="pb-name" id="pb-name">---</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px;" id="pb-region">---</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="pb-client" id="pb-client">---</span>
      <a href="00_proyectos.html" class="hdr-btn">Cambiar proyecto</a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box c-teal"><span class="stat-num" id="st-total">0</span><div class="stat-lbl">Equipos totales</div></div>
    <div class="stat-box c-green"><span class="stat-num" id="st-ds">0</span><div class="stat-lbl">Datasheets generados</div></div>
    <div class="stat-box c-amber"><span class="stat-num" id="st-pend">0</span><div class="stat-lbl">Pendientes</div></div>
    <div class="stat-box c-red"><span class="stat-num" id="st-areas">0</span><div class="stat-lbl">Areas detectadas</div></div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <span class="search-icon">&#9906;</span>
        <input class="search-in" id="search" placeholder="Buscar equipo o TAG..." oninput="renderGrid()" />
      </div>
      <select class="filter-sel" id="filter-status" onchange="renderGrid()">
        <option value="">Todos los estados</option>
        <option value="pending">Sin datasheet</option>
        <option value="done">Con datasheet</option>
      </select>
    </div>
    <div class="area-chips" id="area-chips"></div>
  </div>

  <div class="eq-grid" id="eq-grid"></div>
</main>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
if (!SHARED.requireAuth()) {}

var equipment     = [];
var activeArea    = 'all';
var activeProject = null;

function init() {
  try { activeProject = JSON.parse(localStorage.getItem('pid_active_project') || 'null'); } catch(e) {}

  if (activeProject) {
    document.getElementById('project-banner').style.display = '';
    document.getElementById('hdr-project-name').textContent = activeProject.name;
    document.getElementById('pb-num').textContent    = activeProject.num    || '---';
    document.getElementById('pb-name').textContent   = activeProject.name;
    document.getElementById('pb-region').textContent = activeProject.region || '---';
    document.getElementById('pb-icon').textContent   = (activeProject.num || 'PR').slice(0,3).toUpperCase();
    var clientEl = document.getElementById('pb-client');
    clientEl.textContent = activeProject.client || '---';
    clientEl.className   = 'pb-client ' + (activeProject.client || '').toLowerCase();
  }

  var sharedEq  = SHARED.getEquipment();
  var projectEq = activeProject ? (activeProject.equipment || []) : [];

  if (sharedEq.length > 0) {
    var existingIds = projectEq.map(function(e){ return e.id; });
    var newEqs = sharedEq.filter(function(e){ return existingIds.indexOf(e.id) === -1; });
    equipment = projectEq.concat(newEqs);
    saveToProject();
    SHARED.saveEquipment([]);
  } else {
    equipment = projectEq;
  }

  renderStats();
  renderAreaChips();
  renderGrid();
}

function saveToProject() {
  if (!activeProject) return;
  activeProject.equipment = equipment;
  localStorage.setItem('pid_active_project', JSON.stringify(activeProject));
  var projects = JSON.parse(localStorage.getItem('pid_projects') || '[]');
  var idx = projects.findIndex(function(p){ return p.id === activeProject.id; });
  if (idx > -1) { projects[idx] = activeProject; localStorage.setItem('pid_projects', JSON.stringify(projects)); }
}

function renderStats() {
  var areas = new Set(equipment.map(function(e){ return e.area; }).filter(Boolean));
  var ds    = equipment.filter(function(e){ return e.dsGenerated; }).length;
  document.getElementById('st-total').textContent = equipment.length;
  document.getElementById('st-ds').textContent    = ds;
  document.getElementById('st-pend').textContent  = equipment.length - ds;
  document.getElementById('st-areas').textContent = areas.size;
}

function renderAreaChips() {
  var areas    = ['all'];
  var areaSet  = {};
  equipment.forEach(function(e){ if (e.area && !areaSet[e.area]) { areaSet[e.area] = true; areas.push(e.area); } });

  document.getElementById('area-chips').innerHTML = areas.map(function(a) {
    var lbl = a === 'all' ? 'Todas las areas' : a;
    var cls = 'area-chip' + (a === activeArea ? ' active' : '');
    return '<button class="' + cls + '" onclick="filterArea(\'' + esc(a) + '\',this)">' + esc(lbl) + '</button>';
  }).join('');
}

function filterArea(area, btn) {
  activeArea = area;
  document.querySelectorAll('.area-chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  var search  = document.getElementById('search').value.toLowerCase();
  var fSt     = document.getElementById('filter-status').value;
  var filtered = equipment.filter(function(eq) {
    var matchA = activeArea === 'all' || eq.area === activeArea;
    var matchS = !search || eq.tag.toLowerCase().indexOf(search) > -1 ||
                 (eq.name||'').toLowerCase().indexOf(search) > -1;
    var matchSt= !fSt ||
      (fSt === 'done'    &&  eq.dsGenerated) ||
      (fSt === 'pending' && !eq.dsGenerated);
    return matchA && matchS && matchSt;
  });

  var grid = document.getElementById('eq-grid');

  if (!filtered.length) {
    var msg = equipment.length === 0
      ? '<p style="font-size:13px;margin-top:6px;">Analiza un P&ID para cargar equipos.</p><br><a href="02_subir_pid.html" style="color:var(--teal);">Ir a Analizar P&ID</a>'
      : '<p style="font-size:13px;">Sin resultados para los filtros actuales.</p>';
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">&#9711;</span><div class="empty-title">Sin equipos</div>' + msg + '</div>';
    return;
  }

  grid.innerHTML = filtered.map(function(eq) {
    var isDone   = eq.dsGenerated;
    var cardCls  = 'eq-card' + (isDone ? ' ds-done' : '');
    var stCls    = isDone ? 'ds-status done' : 'ds-status pending';
    var stTxt    = isDone ? 'Datasheet generado' : 'Datasheet pendiente';
    var typeBadge= eq.type ? '<span class="eq-type-b">' + esc(eq.type) + '</span>' : '';
    var areaTxt  = eq.area ? '&#128205; ' + esc(eq.area) : '';

    return '<div class="' + cardCls + '">' +
      '<div class="eq-hdr"><span class="eq-tag-badge">' + esc(eq.tag) + '</span>' + typeBadge + '</div>' +
      '<div class="eq-name">' + esc(eq.name || '') + '</div>' +
      '<div class="eq-area">' + areaTxt + '</div>' +
      '<div class="eq-specs">' +
        '<div class="eq-spec"><span class="eq-spec-l">POTENCIA</span><span class="eq-spec-v">' + esc(eq.power||'---') + '</span></div>' +
        '<div class="eq-spec"><span class="eq-spec-l">CAPACIDAD</span><span class="eq-spec-v">' + esc(eq.capacity||'---') + '</span></div>' +
        '<div class="eq-spec"><span class="eq-spec-l">PRESION</span><span class="eq-spec-v">' + esc(eq.pressure||'---') + '</span></div>' +
        '<div class="eq-spec"><span class="eq-spec-l">TEMPERATURA</span><span class="eq-spec-v">' + esc(eq.temperature||'---') + '</span></div>' +
      '</div>' +
      '<div class="' + stCls + '"><div class="ds-dot"></div>' + stTxt + '</div>' +
      '<div class="eq-actions">' +
        '<a href="05_datasheet.html" class="eq-btn ' + (isDone ? 'success' : 'primary') + '" onclick="setActiveEq(\'' + eq.id + '\')">' +
          (isDone ? '&#9783; Ver datasheet' : '&#9783; Generar datasheet') +
        '</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

function setActiveEq(id) {
  // Store which equipment to pre-select in module 05
  localStorage.setItem('pid_selected_eq', id);
}

function exportEquipmentList() {
  if (!equipment.length) { SHARED.toast('No hay equipos', 'warning'); return; }
  var p    = activeProject || {};
  var date = new Date().toLocaleDateString('es-MX');
  var hdr  = ['No','TAG','Nombre','Tipo','Clase','Area','Potencia','Capacidad','Tamano','Presion','Temperatura','Material','Estado','Criticidad','Datasheet'];
  var rows = equipment.map(function(eq,i) {
    return [i+1, eq.tag, eq.name||'', eq.type||'', eq.clase||'',
            eq.area||'', eq.power||'', eq.capacity||'', eq.size||'',
            eq.pressure||'', eq.temperature||'', eq.material||'',
            eq.status||'', eq.criticality||'',
            eq.dsGenerated ? 'Generado' : 'Pendiente'];
  });
  var meta = [
    ['LISTADO DE EQUIPOS CONFIRMADOS'],
    ['Proyecto:', p.name||'---', 'No:', p.num||'---'],
    ['Cliente:', p.client||'---', 'Planta:', p.region||'---'],
    ['Ingeniero:', p.engineer||'---', 'Fecha:', date],
    ['Total:', equipment.length, 'Datasheets:', equipment.filter(function(e){ return e.dsGenerated; }).length],
    [],
    hdr
  ].concat(rows);
  var csv = meta.map(function(r){
    return r.map(function(c){ return '"' + String(c||'').replace(/"/g,'""') + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Equipos_' + (p.num||'PRY') + '_' + date.replace(/\//g,'-') + '.csv';
  a.click(); URL.revokeObjectURL(a.href);
  SHARED.toast('Lista exportada', 'success');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
